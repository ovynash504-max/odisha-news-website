<script>
async function getNews() {
  let url = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://news.google.com/rss/search?q=odisha&hl=en-IN&gl=IN&ceid=IN:en");

  try {
    let res = await fetch(url);
    let data = await res.json();

    let parser = new DOMParser();
    let xml = parser.parseFromString(data.contents, "text/xml");
    let items = xml.querySelectorAll("item");

    let container = document.getElementById("news");

    if (items.length === 0) {
      container.innerHTML = "<h2>No news found</h2>";
      return;
    }

    container.innerHTML = "";

    items.forEach(item => {
      let title = item.querySelector("title").textContent;
      let link = item.querySelector("link").textContent;

      container.innerHTML += `
        <div class="card">
          <h3>${title}</h3>
          <a href="${link}" target="_blank">Read More</a>
        </div>
      `;
    });

  } catch (error) {
    document.getElementById("news").innerHTML = "<h2>Error loading news ❌</h2>";
  }
}

getNews();
</script>
