<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odisha Breaking News</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

#news {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
  <h1>Odisha Breaking News</h1>
</header>

<h2 style="text-align:center;">Latest Odisha Updates</h2>

<div id="news">Loading...</div>

<script>
const apiKey = "2e1a0bb9e3e8661701ea292d24bd11ce";

async function getNews() {

  let realUrl = `https://gnews.io/api/v4/top-headlines?country=in&q=odisha&max=10&token=${apiKey}`;
  
  // ✅ Proxy fix
  let url = `https://api.allorigins.win/get?url=${encodeURIComponent(realUrl)}`;

  try {
    let res = await fetch(url);
    let proxyData = await res.json();
    let data = JSON.parse(proxyData.contents);

    let container = document.getElementById("news");

    if (!data.articles || data.articles.length === 0) {
      container.innerHTML = "<h2>No news found</h2>";
      return;
    }

    container.innerHTML = data.articles.map(n => `
      <div class="card">
        <img src="${n.image || 'https://via.placeholder.com/300'}">
        <h3>${n.title}</h3>
        <p>${n.description || ''}</p
