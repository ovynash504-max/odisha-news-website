<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odisha Breaking News</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

nav a {
  margin: 10px;
  color: white;
  text-decoration: none;
}

#news {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

h2 {
  text-align: center;
}
</style>

</head>

<body>

<header>
  <h1>Odisha Breaking News</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Jobs</a>
    <a href="#">Results</a>
    <a href="#">Sports</a>
    <a href="#">Tech</a>
  </nav>
</header>

<h2>Latest Odisha Updates</h2>

<div id="news">Loading...</div>

<script>
const apiKey = "2e1a0bb9e3e8661701ea292d24bd11ce";

async function getNews() {
  let url = `https://gnews.io/api/v4/top-headlines?country=in&q=odisha&max=10&token=${apiKey}`;

  try {
    let res = await fetch(url);
    let data = await res.json();

    console.log(data);

    let container = document.getElementById("news");

    if (data.errors) {
      container.innerHTML = "<h2>⚠️ API Not Activated / Error</h2>";
      return;
    }

    if (!data.articles || data.articles.length === 0) {
      container.innerHTML = "<h2>No news found</h2>";
      return;
    }

    container.innerHTML = data.articles.map(n => `
      <div class="card">
        <img src="${n.image || 'https://via.placeholder.com/300'}">
        <h3>${n.title}</h3>
        <p>${n.description || ''}</p>
        <a href="${n.url}" target="_blank">Read More</a>
      </div>
    `).join('');

  } catch (error) {
    document.getElementById("news").innerHTML = "<h2>❌ Error loading news</h2>";
  }
}

getNews();
</script>

</body>
</html>
