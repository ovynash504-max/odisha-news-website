<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odisha Breaking News</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

h1 {
  padding: 20px;
}

.news {
  padding: 20px;
}

.card {
  background: #111;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Odisha Breaking News</h1>
<h2>Latest Odisha Updates</h2>

<div id="news">Loading news...</div>

<script>
const apiKey = "2e1a0bb9e3e8661701ea292d24bd11ce";

// 🔥 Proxy use kar rahe hai (IMPORTANT)
const url = `https://api.allorigins.win/raw?url=https://gnews.io/api/v4/top-headlines?country=in&lang=en&max=10&apikey=${apiKey}`;

fetch(url)
.then(res => res.json())
.then(data => {
  const newsDiv = document.getElementById("news");
  newsDiv.innerHTML = "";

  if (!data.articles) {
    newsDiv.innerHTML = "❌ API limit ya error";
    return;
  }

  data.articles.forEach(article => {
    newsDiv.innerHTML += `
      <div class="card">
        <h3>${article.title}</h3>
        <p>${article.description || "No description"}</p>
        <a href="${article.url}" target="_blank">Read more</a>
      </div>
    `;
  });
})
.catch(err => {
  document.getElementById("news").innerHTML = "❌ Error loading news";
});
</script>

</body>
</html>
